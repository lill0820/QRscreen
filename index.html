<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR Screen</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="customer-screen" id="customerScreen" aria-label="お客様向けQR表示">
    <button class="admin-entry-button" id="adminEntryButton" type="button">管理</button>

    <section class="qr-display">
      <div class="qr-panel" id="qrPanel">
        <img class="qr-image" id="qrImage" alt="読み取り用QRコード" hidden>
        <div class="qr-placeholder" id="qrPlaceholder">
          QRコード未設定
        </div>
      </div>
      <p class="customer-caption" id="customerCaption">スマートフォンのカメラで読み取ってください</p>
    </section>
  </main>

  <dialog class="password-dialog" id="passwordDialog" aria-labelledby="passwordTitle">
    <form class="password-box" id="passwordForm" method="dialog">
      <h1 id="passwordTitle">管理画面</h1>
      <p>運営用パスワードを入力してください。</p>
      <label for="passwordInput">パスワード</label>
      <input id="passwordInput" type="password" autocomplete="current-password" inputmode="numeric">
      <p class="error-message" id="passwordError" aria-live="polite"></p>
      <div class="dialog-actions">
        <button class="button secondary" id="cancelPasswordButton" type="button">閉じる</button>
        <button class="button primary" type="submit">入る</button>
      </div>
    </form>
  </dialog>

  <section class="admin-screen" id="adminScreen" aria-label="運営管理画面" hidden>
    <aside class="admin-sidebar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <span></span><span></span><span></span>
          <span></span><span></span><span></span>
          <span></span><span></span><span></span>
        </div>
        <div>
          <h2>QR Screen</h2>
          <p>運営管理画面</p>
        </div>
      </div>

      <form id="settingsForm">
        <div class="field">
          <label for="qrFile">お客様に見せるQRコード画像</label>
          <input id="qrFile" type="file" accept="image/png,image/jpeg,image/webp,image/svg+xml">
        </div>

        <div class="field">
          <label for="captionInput">QR下の案内文</label>
          <input id="captionInput" type="text" maxlength="40">
        </div>

        <div class="field">
          <label for="sizeInput">QRコードの大きさ</label>
          <div class="range-row">
            <input id="sizeInput" type="range" min="260" max="720" step="10">
            <span id="sizeValue">520px</span>
          </div>
        </div>

        <div class="field">
          <label for="backgroundInput">背景色</label>
          <input id="backgroundInput" type="color">
        </div>

        <div class="field">
          <label for="passwordChangeInput">管理パスワード変更</label>
          <input id="passwordChangeInput" type="password" autocomplete="new-password" placeholder="変更するときだけ入力">
        </div>

        <div class="actions">
          <button class="button primary" type="submit">保存して表示</button>
          <button class="button secondary" id="previewButton" type="button">表示だけ戻る</button>
        </div>
      </form>

      <p class="admin-note">
        お客様画面から管理画面を開くには、左上の管理ボタンを押してパスワードを入力します。初期パスワードは <strong>1234</strong> です。
      </p>
    </aside>

    <section class="admin-preview" aria-label="プレビュー">
      <div class="preview-shell">
        <div class="preview-label">お客様に見える画面</div>
        <div class="preview-screen">
          <div class="preview-qr-panel" id="previewQrPanel">
            <img class="preview-qr-image" id="previewQrImage" alt="QRコードのプレビュー" hidden>
            <div class="preview-placeholder" id="previewPlaceholder">QRコード未設定</div>
          </div>
          <p class="preview-caption" id="previewCaption">スマートフォンのカメラで読み取ってください</p>
        </div>
      </div>
    </section>
  </section>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
